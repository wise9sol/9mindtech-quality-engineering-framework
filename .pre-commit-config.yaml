repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: (\.env\.example|\.secrets\.baseline)$

  - repo: local
    hooks:
      - id: black
        name: black
        entry: black
        language: system
        types: [python]

      - id: flake8
        name: flake8
        entry: flake8
        language: system
        types: [python]
        args: ["--max-line-length=120", "--exclude=.venv,reports,website"]

      - id: mypy
        name: mypy
        entry: mypy
        language: system
        types: [python]
        args: ["ai/", "pages/", "utils/", "--ignore-missing-imports", "--explicit-package-bases"]
        pass_filenames: false
