name: tests
on:
  push:
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: flake8
        run: flake8 . --exclude=.venv,reports,website --max-line-length=120
      - name: black
        run: black --check . --exclude ".venv|reports|website"
      - name: mypy
        run: mypy ai/ pages/ utils/ --ignore-missing-imports --explicit-package-bases
      - name: bandit
        run: bandit -r ai/ pages/ utils/ -ll

  smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run smoke tests
        run: python -m pytest -m "smoke and ui" --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Write Allure environment properties
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Suite=Smoke (UI)"
            echo "Browser=Chromium"
            echo "Python=3.13"
            echo "OS=Ubuntu (ubuntu-latest)"
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${{ github.sha }}"
            echo "Base.URL=https://the-internet.herokuapp.com"
          } > reports/allure-results/environment.properties
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
            reports/screenshots/
          retention-days: 14

  api:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: python -m pytest -m api --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Write Allure environment properties
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Suite=API"
            echo "Browser=N/A"
            echo "Python=3.13"
            echo "OS=Ubuntu (ubuntu-latest)"
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${{ github.sha }}"
            echo "API.Base.URL=https://jsonplaceholder.typicode.com"
          } > reports/allure-results/environment.properties
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
          retention-days: 14

  cross-browser:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}
      - name: Run smoke tests (${{ matrix.browser }})
        run: python -m pytest -m "smoke and ui" --browser ${{ matrix.browser }} --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Write Allure environment properties
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Suite=Cross-Browser Smoke"
            echo "Browser=${{ matrix.browser }}"
            echo "Python=3.13"
            echo "OS=Ubuntu (ubuntu-latest)"
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${{ github.sha }}"
            echo "Base.URL=https://the-internet.herokuapp.com"
          } > reports/allure-results/environment.properties
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload cross-browser reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-${{ matrix.browser }}-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
            reports/screenshots/
          retention-days: 14

  regression:
    needs: [smoke, api]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run regression suite
        run: python -m pytest -m regression -n auto --tb=short --html=reports/report.html --self-contained-html --save-traces
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Write Allure environment properties
        if: always()
        run: |
          mkdir -p reports/allure-results
          {
            echo "Suite=Regression"
            echo "Browser=Chromium"
            echo "Python=3.13"
            echo "OS=Ubuntu (ubuntu-latest)"
            echo "Parallel.Workers=auto"
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${{ github.sha }}"
            echo "Base.URL=https://the-internet.herokuapp.com"
            echo "API.Base.URL=https://jsonplaceholder.typicode.com"
          } > reports/allure-results/environment.properties
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
            reports/ai_analysis/
            reports/screenshots/
            artifacts/
          retention-days: 30
      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report

  deploy-pages:
    needs: regression
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  nist-validation:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore Allure history cache
        uses: actions/cache@v4
        with:
          path: reports/allure-history
          key: allure-nist-history-${{ github.ref_name }}
          restore-keys: allure-nist-history-

      - name: Run NIST compliance tests
        continue-on-error: true
        run: |
          python -m pytest tests/compliance/ \
            --alluredir=reports/allure-results \
            -n auto -v --tb=short
        env:
          API_BASE_URL: ${{ secrets.API_BASE_URL || 'https://jsonplaceholder.typicode.com' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
          USER_TOKEN: ${{ secrets.USER_TOKEN }}
          READONLY_TOKEN: ${{ secrets.READONLY_TOKEN }}
          DEPROVISIONED_TOKEN: ${{ secrets.DEPROVISIONED_TOKEN }}
          EXPIRED_TOKEN: ${{ secrets.EXPIRED_TOKEN }}
          CLIENT_NAME: ${{ secrets.CLIENT_NAME }}
          CLIENT_INDUSTRY: ${{ secrets.CLIENT_INDUSTRY }}

      - name: Copy Allure branding files
        if: always()
        shell: bash
        run: |
          mkdir -p reports/allure-results
          for f in \
            reports/allure-results/environment.properties \
            reports/allure-results/categories.json \
            reports/allure-results/custom.css; do
            if [ -f "$f" ]; then
              cp "$f" reports/allure-results/
            fi
          done

      - name: Write Allure environment properties
        if: always()
        shell: bash
        run: |
          mkdir -p reports/allure-results
          {
            echo "Platform=QualiOps AI"
            echo "Product=QualiOps AI Quality Engineering Platform"
            echo "Vendor=9MindTech / Wise 9 Mind Solutions LLC"
            echo "Contact.Email=wise9mind.solutions@gmail.com"
            echo "Contact.Phone=(240) 269-8965"
            echo "Book.Demo=calendly.com/9mindtech_qa-automation-call"
            echo "Client.Name=${{ secrets.CLIENT_NAME }}"
            echo "Client.Industry=${{ secrets.CLIENT_INDUSTRY }}"
            echo "Language=Python 3.13"
            echo "Test.Runner=pytest 8.3.5"
            echo "Compliance.Standard=NIST 800-53 Rev 5"
            echo "Control.Families=AC, AU, SI, IR, SC, IA"
            echo "Branch=${{ github.ref_name }}"
            echo "Commit=${{ github.sha }}"
            echo "API.Base.URL=${{ secrets.API_BASE_URL || 'https://jsonplaceholder.typicode.com' }}"
          } > reports/allure-results/environment.properties

      - name: Install Allure CLI 2.27.0
        if: always()
        run: |
          curl -sLo allure.tgz \
            https://github.com/allure-framework/allure2/releases/download/2.27.0/allure-2.27.0.tgz
          tar -xzf allure.tgz
          sudo mv allure-2.27.0 /opt/allure
          sudo ln -sf /opt/allure/bin/allure /usr/local/bin/allure

      - name: Generate Allure NIST report
        if: always()
        run: |
          [ -d reports/allure-history ] && \
            cp -r reports/allure-history reports/allure-results/history || true
          allure generate reports/allure-results \
            --clean \
            --report-name "QualiOps AI — NIST Control Validation Report" \
            -o reports/allure-nist-report

      - name: Save Allure history cache
        if: always()
        run: |
          mkdir -p reports/allure-history
          [ -d reports/allure-nist-report/history ] && \
            cp -r reports/allure-nist-report/history/. reports/allure-history/ || true

      - name: Upload NIST report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nist-validation-report
          path: reports/allure-nist-report/
          retention-days: 90

      - name: Upload Pages artifact (push to main only)
        if: always() && github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-nist-report

      - name: Write job summary
        if: always()
        shell: bash
        run: |
          echo "## QualiOps AI — NIST Control Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Control Family | Tests |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| AC — Access Control | AC-2, AC-3, AC-17 |" >> $GITHUB_STEP_SUMMARY
          echo "| AU — Audit and Accountability | AU-2, AU-9, AU-12 |" >> $GITHUB_STEP_SUMMARY
          echo "| SI — System Integrity | SI-2, SI-10, SI-12 |" >> $GITHUB_STEP_SUMMARY
          echo "| SC — System Protection | SC-8, SC-28 |" >> $GITHUB_STEP_SUMMARY
          echo "| IA — Identity and Authentication | IA-2, IA-5 |" >> $GITHUB_STEP_SUMMARY
          echo "| IR — Incident Response | IR-5, IR-6 |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Report**: uploaded as artifact \`nist-validation-report\` (90-day retention)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "_QualiOps AI · wise9mind.solutions@gmail.com · (240) 269-8965_" >> $GITHUB_STEP_SUMMARY
