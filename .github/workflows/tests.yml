name: tests
on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install lint tools
        run: pip install flake8==7.3.0 black==26.5.1
      - name: flake8
        run: flake8 . --exclude=.venv,reports,website --max-line-length=120
      - name: black
        run: black --check . --exclude ".venv|reports|website"

  smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run smoke tests
        run: python -m pytest -m smoke --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/screenshots/
          retention-days: 14

  api:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: python -m pytest -m api --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: |
            reports/report.html
            reports/allure-results/
          retention-days: 14

  regression:
    needs: [smoke, api]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run regression suite
        run: python -m pytest -m regression -n auto --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/ai_analysis/
            reports/screenshots/
            artifacts/
          retention-days: 14
