name: tests
on:
  push:
  pull_request:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: flake8
        run: flake8 . --exclude=.venv,reports,website --max-line-length=120
      - name: black
        run: black --check . --exclude ".venv|reports|website"
      - name: mypy
        run: mypy ai/ pages/ utils/ --ignore-missing-imports --explicit-package-bases
      - name: bandit
        run: bandit -r ai/ pages/ utils/ -ll

  smoke:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run smoke tests
        run: python -m pytest -m "smoke and ui" --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload smoke reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
            reports/screenshots/
          retention-days: 14

  api:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run API tests
        run: python -m pytest -m api --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload API reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
          retention-days: 14

  cross-browser:
    needs: lint
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [firefox, webkit]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install ${{ matrix.browser }}
          playwright install-deps ${{ matrix.browser }}
      - name: Run smoke tests (${{ matrix.browser }})
        run: python -m pytest -m "smoke and ui" --browser ${{ matrix.browser }} --tb=short --html=reports/report.html --self-contained-html
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload cross-browser reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cross-browser-${{ matrix.browser }}-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
            reports/screenshots/
          retention-days: 14

  regression:
    needs: [smoke, api]
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          playwright install chromium
          playwright install-deps chromium
      - name: Run regression suite
        run: python -m pytest -m regression -n auto --tb=short --html=reports/report.html --self-contained-html --save-traces
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TEST_USERNAME: ${{ secrets.TEST_USERNAME || 'tomsmith' }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD || 'SuperSecretPassword!' }}
      - name: Generate Allure HTML report
        if: always()
        run: |
          npm install -g allure-commandline --save-dev
          allure generate reports/allure-results --clean -o reports/allure-report
      - name: Upload regression reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-reports
          path: |
            reports/report.html
            reports/allure-results/
            reports/allure-report/
            reports/ai_analysis/
            reports/screenshots/
            artifacts/
          retention-days: 30
      - name: Upload Pages artifact
        if: success()
        uses: actions/upload-pages-artifact@v3
        with:
          path: reports/allure-report

  deploy-pages:
    needs: regression
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
