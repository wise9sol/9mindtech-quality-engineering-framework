[pytest]
addopts = -v --alluredir=reports/allure-results
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

log_cli = true
log_cli_level = INFO

log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

markers =
    smoke: smoke tests
    regression: regression tests
    api: API tests
    ui: UI tests
    network: Network reliability tests
    ai_generated: Tests created by the AI test generator
    nist_ac2: NIST 800-53 AC-2 Account Management
    nist_ac3: NIST 800-53 AC-3 Access Enforcement
    nist_ac17: NIST 800-53 AC-17 Remote Access
    nist_au2: NIST 800-53 AU-2 Event Logging
    nist_au9: NIST 800-53 AU-9 Protection of Audit Information
    nist_au12: NIST 800-53 AU-12 Audit Record Generation
    nist_si2: NIST 800-53 SI-2 Flaw Remediation
    nist_si10: NIST 800-53 SI-10 Information Input Validation
    nist_si12: NIST 800-53 SI-12 Information Management and Retention
    nist_ir5: NIST 800-53 IR-5 Incident Monitoring
    nist_ir6: NIST 800-53 IR-6 Incident Reporting
    nist_sc8: NIST 800-53 SC-8 Transmission Confidentiality and Integrity
    nist_sc28: NIST 800-53 SC-28 Protection of Information at Rest
    nist_ia2: NIST 800-53 IA-2 Identification and Authentication
    nist_ia5: NIST 800-53 IA-5 Authenticator Management
    compliance: cross-cutting compliance tests
    healthcare: healthcare regulatory tests
    finance: finance regulatory tests