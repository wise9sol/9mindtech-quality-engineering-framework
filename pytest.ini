[pytest]
addopts = -v --alluredir=reports/allure-results
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

log_cli = true
log_cli_level = INFO

log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %H:%M:%S

markers =
    smoke: smoke tests
    regression: regression tests
    api: API tests
    ui: UI tests
    network: Network reliability tests
    ai_generated: Tests created by the AI test generator
    nist_ac2: NIST 800-53 AC-2 Account Management
    nist_ac3: NIST 800-53 AC-3 Access Enforcement
    nist_ac17: NIST 800-53 AC-17 Remote Access
    nist_au2: NIST 800-53 AU-2 Event Logging
    nist_au9: NIST 800-53 AU-9 Protection of Audit Information
    nist_au12: NIST 800-53 AU-12 Audit Record Generation
    nist_si2: NIST 800-53 SI-2 Flaw Remediation
    nist_si10: NIST 800-53 SI-10 Information Input Validation
    nist_si12: NIST 800-53 SI-12 Information Management and Retention
    nist_ir5: NIST 800-53 IR-5 Incident Monitoring
    nist_ir6: NIST 800-53 IR-6 Incident Reporting
    nist_sc8: NIST 800-53 SC-8 Transmission Confidentiality and Integrity
    nist_sc28: NIST 800-53 SC-28 Protection of Information at Rest
    nist_ia2: NIST 800-53 IA-2 Identification and Authentication
    nist_ia5: NIST 800-53 IA-5 Authenticator Management
    compliance: cross-cutting compliance tests
    healthcare: healthcare regulatory tests
    finance: finance regulatory tests
    durability: stability and robustness tests
    slow: tests that take > 5 minutes
    nist_cm2: NIST 800-53 CM-2 Baseline Configuration
    nist_cm6: NIST 800-53 CM-6 Configuration Settings
    nist_cm7: NIST 800-53 CM-7 Least Functionality
    nist_cm8: NIST 800-53 CM-8 System Component Inventory
    nist_ia3: NIST 800-53 IA-3 Device Identification and Authentication
    nist_ia4: NIST 800-53 IA-4 Identifier Management
    nist_ia8: NIST 800-53 IA-8 Non-Organisational Users
    nist_si4: NIST 800-53 SI-4 System Monitoring
    nist_ca2: NIST 800-53 CA-2 Control Assessments
    nist_ca7: NIST 800-53 CA-7 Continuous Monitoring
    nist_ca9: NIST 800-53 CA-9 Internal System Connections
    nist_cp9: NIST 800-53 CP-9 System Backup
    nist_cp10: NIST 800-53 CP-10 System Recovery and Reconstitution
    nist_sa11: NIST 800-53 SA-11 Developer Testing and Evaluation
    nist_sa15: NIST 800-53 SA-15 Development Process, Standards, and Tools
    nist_ra3: NIST 800-53 RA-3 Risk Assessment
    nist_ra5: NIST 800-53 RA-5 Vulnerability Monitoring and Scanning
    nist_ma2: NIST 800-53 MA-2 Controlled Maintenance
    nist_ma6: NIST 800-53 MA-6 Timely Maintenance
    nist_mp2: NIST 800-53 MP-2 Media Access
    nist_mp6: NIST 800-53 MP-6 Media Sanitization
    nist_pe2: NIST 800-53 PE-2 Physical Access Authorizations
    nist_pe3: NIST 800-53 PE-3 Physical Access Control
    nist_pl2: NIST 800-53 PL-2 System Security and Privacy Plans
    nist_pl4: NIST 800-53 PL-4 Rules of Behavior
    nist_pm1: NIST 800-53 PM-1 Information Security Program Plan
    nist_pm9: NIST 800-53 PM-9 Risk Management Strategy
    nist_ps3: NIST 800-53 PS-3 Personnel Screening
    nist_ps6: NIST 800-53 PS-6 Access Agreements
    nist_sr3: NIST 800-53 SR-3 Supply Chain Controls and Processes
    nist_sr5: NIST 800-53 SR-5 Acquisition Strategies, Tools, and Methods